name: binnagent-exam-english-spike

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-binnagent}
      POSTGRES_USER: ${POSTGRES_USER:-binnagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-binnagent_dev_only}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - binnagent_postgres_data:/var/lib/postgresql

volumes:
  binnagent_postgres_data:
